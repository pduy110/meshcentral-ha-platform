services:
  meshcentral:
    image: ${IMAGE_URI}
    user: "1000:1000"
    restart: unless-stopped
    expose:
      - "800"
      - "4430"
    volumes:
      - ./data:/opt/meshcentral/meshcentral-data
      - ./backups:/opt/meshcentral/meshcentral-backups

    environment:
      - NODE_ENV=production
    security_opt:
      - no-new-privileges:true

  nginx:
    # Nginx version pin: 1.28.2 (stable)
    image: nginx:1.28.2@sha256:810ad1346ec7fd3d0a246c178f2b82e73a43640c691774405adfd38a751ecce8
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/meshcentral.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.certbot/www:/var/www/certbot
      - ./.certbot/conf:/etc/letsencrypt:ro

    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/nginx-healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
