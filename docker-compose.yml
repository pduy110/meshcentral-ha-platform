services:

  meshcentral:
    image: ghcr.io/${IMAGE_REPO}/meshcentral:latest
    user: "1000:1000"
    restart: unless-stopped
    expose:
      - "80"

    volumes:
      - ./data:/opt/meshcentral/meshcentral-data
      - ./backups:/opt/meshcentral/meshcentral-backups

    environment:
      - NODE_ENV=production


  nginx:
    image: nginx:stable
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/meshcentral.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - meshcentral