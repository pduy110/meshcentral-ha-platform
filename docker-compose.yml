services:

  meshcentral:
    image: ${IMAGE_URI}
    user: "1000:1000"
    restart: unless-stopped
    expose:
      - "80"

    volumes:
      - ./data:/opt/meshcentral/meshcentral-data
      - ./backups:/opt/meshcentral/meshcentral-backups

    environment:
      - NODE_ENV=production


  nginx:
    image: nginx:stable
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/meshcentral.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - meshcentral

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s