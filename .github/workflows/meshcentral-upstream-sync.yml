name: Sync MeshCentral Upstream

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: meshcentral-upstream-sync
  cancel-in-progress: false

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Check bot token
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${BOT_PUSH_TOKEN}" ]]; then
            echo "BOT_PUSH_TOKEN is required so the bot push can trigger the normal push-based deploy workflow." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          ref: main
          token: ${{ secrets.BOT_PUSH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Check for upstream MeshCentral updates
        id: upstream
        run: ./scripts/check_meshcentral_upstream.sh

      - name: Commit updated base image digest
        if: steps.upstream.outputs.changed == 'true'
        run: |
          set -euo pipefail

          # Use a PAT bot as GITHUB_TOKEN pushes dont reliably trigger
          git config user.name "meshcentral-updater[bot]"
          git config user.email "meshcentral-updater[bot]@users.noreply.github.com"


          git add docker/Dockerfile
          git commit -m "chore: bump MeshCentral base image digest"

      - name: Push digest update to main
        if: steps.upstream.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git push origin HEAD:main
