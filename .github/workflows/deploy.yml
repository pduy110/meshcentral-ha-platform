name: MeshCentral CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image_digest.outputs.image_uri }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: image_vars
        shell: bash
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY@L}/meshcentral"
          #IMAGE_TAG="sha-${GITHUB_SHA::7}"
          IMAGE_URI="${IMAGE_REPO}:${IMAGE_TAG}"

          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          #echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_vars.outputs.image_repo }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}         

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

      - name: Compute digest image reference
        id: image_digest
        run: |
          IMAGE_URI="${{ steps.image_vars.outputs.image_repo }}@${{ steps.build.outputs.digest }}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:

      - name: Copy infra config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/*,config/*"
          target: "~/meshcentral"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          #debug: true
          script: |
            set -e
            cd ~/meshcentral
            mkdir -p data backups nginx config

            if ! command -v envsubst &> /dev/null; then
              sudo apt update
              sudo apt install -y gettext-base
            fi

            export SERVER_IP=$(curl -s http://checkip.amazonaws.com)
            envsubst < config/config.template.json > data/config.json

            export IMAGE_URI="${{ needs.build.outputs.image_uri }}"

            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_PULL_USERNAME }} --password-stdin

            docker compose up -d --remove-orphans --force-recreate