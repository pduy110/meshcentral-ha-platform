name: MeshCentral CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: |
          echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch Docker image
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t ghcr.io/${{ github.repository }}/meshcentral:latest -f docker/Dockerfile . --push

      # - name: Debug EC2 access
      #   run: |
      #     echo "EC2_HOST=${{ secrets.EC2_HOST }}"
      #     nc -zv ${{ secrets.EC2_HOST }} 22

      - name: Copy infra config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/*,config/*"
          target: "~/meshcentral"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          #debug: true
          script: |
            set -e
            cd ~/meshcentral
            mkdir -p data backups nginx

            if ! command -v envsubst &> /dev/null; then
              sudo apt update
              sudo apt install -y gettext-base
            fi

            export SERVER_IP=$(curl -s http://checkip.amazonaws.com)
            envsubst < config/config.template.json > data/config.json


            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans