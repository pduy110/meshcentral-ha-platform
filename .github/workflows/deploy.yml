name: MeshCentral CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    concurrency:
      group: meshcentral-build-${{ github.ref }}
      cancel-in-progress: true

    outputs:
      image_uri: ${{ steps.image_digest.outputs.image_uri }}
    steps:
      - name: Check out repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Compute image metadata
        id: image_vars
        shell: bash
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY@L}/meshcentral"

          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"


      - name: Generate Docker metadata
        id: docker_meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # v5.6.1
        with:
          images: ${{ steps.image_vars.outputs.image_repo }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}         

      - name: Build and push image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute digest image reference
        id: image_digest
        run: |
          IMAGE_URI="${{ steps.image_vars.outputs.image_repo }}@${{ steps.build.outputs.digest }}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: meshcentral-deploy-${{ github.ref }}
      cancel-in-progress: false

    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4


        # We need the docker-compose.yml and nginx config to deploy, but we don't need the whole repo. To optimize for speed, we can copy only the necessary files.
        # We need these files so the server can run but feel free to modify
      - name: Copy infra config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/*,config/*, scripts/deploy.sh"
          target: "~/meshcentral"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            set -euo pipefail
            cd ~/meshcentral
            chmod +x scripts/deploy.sh


            IMAGE_URI="${{ needs.build.outputs.image_uri }}" \
            SERVER_IP="$(curl -s http://checkip.amazonaws.com)" \
            GHCR_PULL_USERNAME="${{ secrets.GHCR_PULL_USERNAME }}" \
            GHCR_PULL_TOKEN="${{ secrets.GHCR_PULL_TOKEN }}" \
            PROJECT_DIR="$HOME/meshcentral" \

            
            ./scripts/deploy.sh
